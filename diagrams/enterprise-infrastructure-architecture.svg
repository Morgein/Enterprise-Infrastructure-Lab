<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#15803d" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c2410c" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7e22ce" />
    </marker>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 16px; fill: #475569; }
      .box-title { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #0f172a; }
      .box-text { font-family: Arial, sans-serif; font-size: 14px; fill: #0f172a; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #334155; font-weight: 600; }
      .small { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="#f8fafc"/>

  <text x="800" y="48" text-anchor="middle" class="title">Enterprise Infrastructure Lab — Final Architecture</text>
  <text x="800" y="78" text-anchor="middle" class="subtitle">Windows Server · Active Directory · SMB · iSCSI · Veeam · Linux-to-Windows Backup Integration</text>

  <rect x="45" y="115" width="1510" height="840" rx="22" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="75" y="150" class="box-title">Hyper-V Host</text>
  <text x="75" y="173" class="subtitle">EnterpriseLabNet — 10.10.10.0/24</text>

  <!-- Main VM boxes -->
  <g filter="url(#shadow)">
    <rect x="90" y="225" width="310" height="190" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="645" y="225" width="310" height="190" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <rect x="1195" y="225" width="310" height="190" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <rect x="90" y="665" width="310" height="185" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <rect x="645" y="665" width="310" height="185" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <rect x="90" y="475" width="310" height="110" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  </g>

  <!-- dc-vm -->
  <text x="120" y="260" class="box-title">dc-vm</text>
  <text x="120" y="286" class="box-text">10.10.10.10</text>
  <text x="120" y="312" class="box-text">AD DS · DNS · DHCP</text>
  <text x="120" y="338" class="box-text">GPO management</text>
  <text x="120" y="364" class="box-text">SMB File Share host</text>
  <text x="120" y="390" class="box-text">Alias: files.enterprise.lab</text>

  <!-- SMB share logical box -->
  <text x="120" y="510" class="box-title">SMB Share</text>
  <text x="120" y="536" class="box-text">\\files.enterprise.lab\LabShare</text>
  <text x="120" y="562" class="box-text">linux-backups folder</text>

  <!-- storage-vm -->
  <text x="675" y="260" class="box-title">storage-vm</text>
  <text x="675" y="286" class="box-text">10.10.10.20</text>
  <text x="675" y="312" class="box-text">iSCSI Target Server</text>
  <text x="675" y="338" class="box-text">LabLUN01.vhdx → win-client-vm</text>
  <text x="675" y="364" class="box-text">VeeamRepo01.vhdx → backup-vm</text>
  <text x="675" y="390" class="box-text">Alias: storage.enterprise.lab</text>

  <!-- backup-vm -->
  <text x="1225" y="260" class="box-title">backup-vm</text>
  <text x="1225" y="286" class="box-text">10.10.10.30</text>
  <text x="1225" y="312" class="box-text">Veeam Backup &amp; Replication CE</text>
  <text x="1225" y="338" class="box-text">Repository: R:\Backups</text>
  <text x="1225" y="364" class="box-text">Alias: backup.enterprise.lab</text>
  <text x="1225" y="390" class="box-text">Alias: veeam.enterprise.lab</text>

  <!-- win-client-vm -->
  <text x="120" y="700" class="box-title">win-client-vm</text>
  <text x="120" y="726" class="box-text">10.10.10.100</text>
  <text x="120" y="752" class="box-text">Domain-joined Windows client</text>
  <text x="120" y="778" class="box-text">Z: mapped drive via GPO</text>
  <text x="120" y="804" class="box-text">I: iSCSI test disk</text>

  <!-- db-vm -->
  <text x="675" y="700" class="box-title">db-vm</text>
  <text x="675" y="726" class="box-text">10.10.10.40</text>
  <text x="675" y="752" class="box-text">Linux workload</text>
  <text x="675" y="778" class="box-text">CIFS mount: /mnt/labshare</text>
  <text x="675" y="804" class="box-text">Creates Linux backup file</text>

  <!-- Arrows: clean orthogonal paths -->
  <!-- dc-vm hosts SMB share -->
  <path d="M245 415 L245 475" stroke="#0284c7" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="265" y="450" class="label">hosts share</text>

  <!-- SMB to win-client -->
  <path d="M245 585 L245 665" stroke="#7e22ce" stroke-width="2.4" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="265" y="630" class="label">GPO mapped drive Z:</text>

  <!-- db-vm to SMB share -->
  <path d="M645 750 L455 750 L455 530 L400 530" stroke="#dc2626" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="462" y="742" class="label">Linux CIFS mount + backup file</text>

  <!-- backup-vm backs up SMB share -->
  <path d="M1195 355 L1045 355 L1045 530 L400 530" stroke="#c2410c" stroke-width="2.4" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="840" y="515" class="label">Veeam backs up SMB share</text>

  <!-- backup-vm restore to SMB share -->
  <path d="M1195 385 L1075 385 L1075 560 L400 560" stroke="#c2410c" stroke-width="2.4" stroke-dasharray="7 5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="845" y="585" class="label">file-level restore verification</text>

  <!-- storage to backup iSCSI repo -->
  <path d="M955 300 L1195 300" stroke="#15803d" stroke-width="2.4" fill="none" marker-end="url(#arrow-green)"/>
  <text x="1075" y="286" text-anchor="middle" class="label">iSCSI repository LUN → R:</text>

  <!-- storage to win-client iSCSI test disk -->
  <path d="M645 385 L515 385 L515 820 L400 820" stroke="#15803d" stroke-width="2.4" fill="none" marker-end="url(#arrow-green)"/>
  <text x="520" y="612" class="label">iSCSI test LUN → I:</text>

  <!-- DNS aliases from dc-vm to network -->
  <path d="M400 265 L645 265" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5" fill="none" marker-end="url(#arrow)"/>
  <text x="522" y="250" text-anchor="middle" class="label">DNS aliases</text>

  <!-- Legend -->
  <rect x="1050" y="665" width="455" height="185" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="1080" y="700" class="box-title">Validated end-to-end workflow</text>
  <text x="1080" y="732" class="box-text">1. Linux writes backup file to SMB share</text>
  <text x="1080" y="760" class="box-text">2. Windows can read the Linux-generated file</text>
  <text x="1080" y="788" class="box-text">3. Veeam backs up the SMB share to R:\Backups</text>
  <text x="1080" y="816" class="box-text">4. Deleted file is restored and verified</text>

  <rect x="90" y="890" width="1415" height="42" rx="10" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="112" y="916" class="box-text">
    Final workflow: Linux db-vm → //files.enterprise.lab/LabShare → Veeam backup job → iSCSI-backed repository → file-level restore verification
  </text>
</svg>
